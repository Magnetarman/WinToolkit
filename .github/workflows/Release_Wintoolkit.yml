name: Release_Wintoolkit

on:
  workflow_dispatch:
    # Nessun input richiesto, l'action è automatizzata sul branch Dev

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create_release_branch:
    name: Generate Release Branch
    runs-on: windows-latest
    
    steps:
      - name: Checkout Source Repository (Dev)
        uses: actions/checkout@v5
        with:
          ref: Dev
          fetch-depth: 0 # Necessario per fare checkout tra branche

      - name: Estrai Versione da WinToolkit.ps1
        id: extract_version
        shell: pwsh
        run: |
          If (-Not (Test-Path -Path 'WinToolkit.ps1')) {
            Write-Error "❌ File WinToolkit.ps1 non trovato nel branch Dev."
            exit 1
          }
          
          # Cerchiamo la riga esatta: $ToolkitVersion = "2.5.3 (Build 4)"
          $versionLine = Get-Content -Path 'WinToolkit.ps1' | Select-String -Pattern '\$ToolkitVersion\s*=\s*"(.*?)\s*\(Build'
          
          if ($versionLine) {
            # Estrarrà solo '2.5.3' (il primo gruppo di cattura prima di '(Build')
            $versionStr = $versionLine.Matches[0].Groups[1].Value.Trim()
            Write-Host "✅ Versione rilevata: $versionStr"
            
            # Formattiamo il nome del branch: v2.5.3 (spazi non ammessi in git)
            $branchName = "release/v$versionStr"
            Write-Host "🏷️ Nome Branch Futuro: $branchName"
            
            # Esportiamo variabili per step successivi
            echo "VERSION=$versionStr" >> $env:GITHUB_ENV
            echo "BRANCH_NAME=$branchName" >> $env:GITHUB_ENV
          } else {
            Write-Error "❌ Non è stato possibile estrarre la versione dal file. Formato riga inatteso."
            exit 1
          }

      - name: Git Config
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Risolve il problema dei file "identici" visti come modificati (Line Endings CRLF vs LF)
          git config --global core.autocrlf true
          git config --global core.safecrlf false

      - name: Prepara Branch Rilascio Partendo da Main
        shell: pwsh
        run: |
          # Checkout di main (e assicuriamoci sia aggiornato)
          git checkout main
          git pull origin main
          
          # Creiamo il nuovo branch derivato da main
          Write-Host "Creazione branch $($env:BRANCH_NAME) basato su main..."
          # Se il branch esiste localmente o remote, fallirà e l'utente dovrà cancellarlo
          git checkout -b $env:BRANCH_NAME
          
          # Copia (checkout) parziale dal branch Dev origin/Dev
          Write-Host "Effettuando checkout parziale da origin/Dev..."
          
          # I file specificati verranno sovrascritti nel nuovo branch prendendoli da Dev
          $filesToInclude = @(
            "start.ps1",
            "WinToolkit.ps1",
            "README.md",
            "CHANGELOG.md",
            "LICENSE",
            "img/",
            "asset/",
            ".github/ISSUE_TEMPLATE/bug_report.yml",
            ".github/ISSUE_TEMPLATE/feature_request.yml",
            ".github/workflows/Release_Wintoolkit.yml",
            ".github/CODE_OF_CONDUCT.md",
            ".github/CONTRIBUTING.md",
            ".github/pull_request_template.md"
          )
          git checkout origin/Dev -- $filesToInclude
          if ($LASTEXITCODE -ne 0) {
            Write-Error "❌ Errore durante l'estrazione parziale dei file."
            exit 1
          }

          # Esclusione specifica della cartella png in asset
          if (Test-Path -Path 'asset/png') {
            Write-Host "🗑️ Rimoziene cartella asset/png esclusa dal rilascio..."
            Remove-Item -Recurse -Force 'asset/png'
          }

      - name: Commit delle Modifiche
        shell: pwsh
        run: |
          $filesToInclude = @(
            "start.ps1",
            "WinToolkit.ps1",
            "README.md",
            "CHANGELOG.md",
            "LICENSE",
            "img/",
            "asset/",
            ".github/ISSUE_TEMPLATE/bug_report.yml",
            ".github/ISSUE_TEMPLATE/feature_request.yml",
            ".github/workflows/Release_Wintoolkit.yml",
            ".github/CODE_OF_CONDUCT.md",
            ".github/CONTRIBUTING.md",
            ".github/pull_request_template.md"
          )
          git add $filesToInclude
          
          # Verifica se ci sono modifiche prima di committare
          git diff-index --quiet HEAD
          if ($LASTEXITCODE -ne 0) {
            git commit -m "🚀 Preparazione Release v$($env:VERSION) dal branch Dev"
          } else {
            Write-Host "Nessuna modifica rilevata, salto il commit."
          }
          
      - name: Push Branch su Origin
        shell: pwsh
        run: |
          Write-Host "Pushing branch $($env:BRANCH_NAME) to origin..."
          git push origin $env:BRANCH_NAME
          if ($LASTEXITCODE -ne 0) {
             Write-Error "❌ Errore durante il git push. Verifica che il branch non esista già con conflitti."
             exit 1
          }
          Write-Host "✅ Push completato! Ora puoi aprire la PR per il merge in main."
