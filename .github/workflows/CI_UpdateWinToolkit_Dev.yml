# =============================================================================
# WinToolkit Enterprise CI/CD Pipeline
# =============================================================================
# Pipeline modulare per la compilazione, test e rilascio di WinToolkit.ps1
#
# Job structure:
#   1. Linting    -> Analisi statica del codice sorgente
#   2. Build      -> Compilazione, test e statistiche compressione
#   3. Release    -> Commit, tag e GitHub Release
# =============================================================================

name: CI_WinToolkit_Enterprise

# ---------------------------------------------------------------------------
# TRIGGER
# ---------------------------------------------------------------------------
on:
  push:
    branches: [Dev]
    paths:
      - "tool/*.ps1"
      - "WinToolkit-template.ps1"
      - "compiler.ps1"

# ---------------------------------------------------------------------------
# CONCURRENCY - Previene build simultanee sulla stessa branch
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# JOB 1: LINTING - Analisi statica del codice
# ---------------------------------------------------------------------------
jobs:
  linting:
    name: Linting
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PowerShell
        shell: pwsh
        run: |
          Write-Host "PowerShell Version:" -ForegroundColor Cyan
          $PSVersionTable

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Write-Host "Installing PSScriptAnalyzer..." -ForegroundColor Yellow
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
          } else {
            Write-Host "PSScriptAnalyzer already installed" -ForegroundColor Green
          }

      - name: Run PSScriptAnalyzer on tool files
        id: lint_tool
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI STATICA FILE /TOOL" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $settingsPath = ".github/linters/PSScriptAnalyzer-settings.psd1"
          $results = @()
          $hasErrors = $false

          $toolFiles = Get-ChildItem -Path "tool" -Filter "*.ps1" -ErrorAction SilentlyContinue

          foreach ($file in $toolFiles) {
            Write-Host "`nAnalyzing: $($file.Name)" -ForegroundColor Yellow

            $analysis = Invoke-ScriptAnalyzer -Path $file.FullName -Settings $settingsPath -Severity Error,Warning

            if ($analysis) {
              foreach ($issue in $analysis) {
                Write-Host "  ❌ $($issue.Severity): $($issue.RuleName)" -ForegroundColor Red
                Write-Host "     $($issue.Message)" -ForegroundColor Gray
                $results += [PSCustomObject]@{
                  File = $file.Name
                  Line = $issue.Line
                  Severity = $issue.Severity
                  Rule = $issue.RuleName
                  Message = $issue.Message
                }
                if ($issue.Severity -eq 'Error') {
                  $hasErrors = $true
                }
              }
            } else {
              Write-Host "  ✅ OK" -ForegroundColor Green
            }
          }

          # Salva i risultati per il prossimo job
          $results | ConvertTo-Json -Depth 3 | Out-File -FilePath "$env:TEMP\lint_results.json" -Encoding utf8

          if ($hasErrors) {
            Write-Host "`n❌ Errori di linting rilevati!" -ForegroundColor Red
            exit 1
          } else {
            Write-Host "`n✅ Linting completato senza errori" -ForegroundColor Green
          }

      - name: Run PSScriptAnalyzer on template
        id: lint_template
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI STATICA TEMPLATE" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $settingsPath = ".github/linters/PSScriptAnalyzer-settings.psd1"

          Write-Host "`nAnalyzing: WinToolkit-template.ps1" -ForegroundColor Yellow
          $analysis = Invoke-ScriptAnalyzer -Path "WinToolkit-template.ps1" -Settings $settingsPath -Severity Error,Warning

          if ($analysis) {
            foreach ($issue in $analysis) {
              Write-Host "  $($issue.Severity): $($issue.RuleName)" -ForegroundColor $(if($issue.Severity -eq 'Error'){'Red'}else{'Yellow'})
              Write-Host "     $($issue.Message)" -ForegroundColor Gray
            }
            $hasErrors = $analysis | Where-Object { $_.Severity -eq 'Error' }
            if ($hasErrors) {
              Write-Host "`n❌ Errori di linting nel template!" -ForegroundColor Red
              exit 1
            }
          } else {
            Write-Host "  ✅ OK" -ForegroundColor Green
          }

      - name: Check for syntax errors in compiler
        id: lint_compiler
        shell: pwsh
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI SINTASSI COMPILER" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $content = Get-Content -Raw -Path "compiler.ps1" -ErrorAction Stop
          $parseErrors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseInput($content, [ref]$null, [ref]$parseErrors)

          if ($parseErrors.Count -gt 0) {
            Write-Host "❌ Errori di sintassi in compiler.ps1:" -ForegroundColor Red
            foreach ($error in $parseErrors) {
              Write-Host "  Linea $($error.Extent.StartLineNumber): $($error.Message)" -ForegroundColor Red
            }
            exit 1
          } else {
            Write-Host "✅ Sintassi compiler.ps1 OK" -ForegroundColor Green
          }

  # ---------------------------------------------------------------------------
  # JOB 2: BUILD & TEST - Compilazione e validazione
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: windows-latest
    needs: linting

    permissions:
      contents: write
      actions: read

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      build_number: ${{ steps.version.outputs.build_number }}
      source_kb: ${{ steps.build.outputs.source_kb }}
      output_kb: ${{ steps.build.outputs.output_kb }}
      reduction_percent: ${{ steps.build.outputs.reduction_percent }}
      lines_removed: ${{ steps.build.outputs.lines_removed }}
      tests_passed: ${{ steps.test.outputs.tests_passed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup PowerShell
        shell: pwsh
        run: |
          Write-Host "PowerShell Version:" -ForegroundColor Cyan
          $PSVersionTable

      # ========================================
      # Step: Incrementa Versione
      # ========================================
      - name: Incrementa Versione
        id: version
        shell: pwsh
        run: |
          & .github/scripts/Update-Version.ps1 -TemplatePath "WinToolkit-template.ps1"

      - name: Commit Template Aggiornato
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🔖 Bump WinToolkit version to ${{ steps.version.outputs.new_version }}

            • Incremento automatico numero build
            • Versione aggiornata nel template
            [skip ci]
          file_pattern: WinToolkit-template.ps1
          branch: Dev

      # ========================================
      # Step: Compilazione
      # ========================================
      - name: Compilazione WinToolkit.ps1
        id: build
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.new_version }}"
          & .github/scripts/Invoke-Build.ps1 -Version $version -OutputPath "WinToolkit.ps1"

      # ========================================
      # Step: Test File Compilato
      # ========================================
      - name: Test File Compilato
        id: test
        shell: pwsh
        run: |
          & .github/scripts/Test-CompiledScript.ps1 -ScriptPath "WinToolkit.ps1"

      # ========================================
      # Step: Upload Artifact
      # ========================================
      - name: Upload WinToolkit.ps1 as artifact
        uses: actions/upload-artifact@v4
        if: steps.test.outputs.tests_passed == 'true'
        with:
          name: WinToolkit-Compiled
          path: WinToolkit.ps1
          retention-days: 30

      # ========================================
      # Step: GitHub Step Summary
      # ========================================
      - name: Generate Build Summary
        if: steps.test.outputs.tests_passed == 'true'
        shell: pwsh
        run: |
          $sourceKB = "${{ steps.build.outputs.source_kb }}"
          $outputKB = "${{ steps.build.outputs.output_kb }}"
          $reduction = "${{ steps.build.outputs.reduction_percent }}"
          $linesRemoved = "${{ steps.build.outputs.lines_removed }}"
          $version = "${{ steps.version.outputs.new_version }}"
          $buildNum = "${{ steps.version.outputs.build_number }}"

          $summary = @"
          ## 📦 Build Summary - WinToolkit v$version

          ### 📊 Statistiche Compressione

          | Metrica | Valore |
          |---------|--------|
          | Peso Sorgente | $sourceKB KB |
          | Peso Finale | $outputKB KB |
          | Riduzione | $reduction% |
          | Righe Eliminate | $linesRemoved |

          ### ✅ Status Build

          - **Versione**: $version (Build $buildNum)
          - **Stato**: Completato con successo
          - **Artefatto**: WinToolkit-Compiled.zip

          ---
          *Generato automaticamente da WinToolkit CI/CD Pipeline*
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

  # ---------------------------------------------------------------------------
  # JOB 3: RELEASE & TAGGING - Rilascio e creazione tag
  # ---------------------------------------------------------------------------
  release:
    name: Release & Tagging
    runs-on: windows-latest
    needs: build

    if: needs.build.outputs.tests_passed == 'true'

    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download compiled artifact
        uses: actions/download-artifact@v4
        with:
          name: WinToolkit-Compiled
          path: .

      - name: Commit WinToolkit.ps1 Compilato
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🔧 Update WinToolkit.ps1 - Auto-compiled and tested

            • Compilazione automatica da file in /tool
            • Test di sintassi e struttura passati
            • Funzioni rilevate automaticamente dalla cartella tool/
            • File aggiornato e funzionale
            [skip ci]
          file_pattern: WinToolkit.ps1
          branch: Dev

      - name: Extract version info
        id: version_info
        shell: pwsh
        run: |
          $content = Get-Content -Path "WinToolkit-template.ps1" -Raw
          if ($content -match '\$ToolkitVersion\s*=\s*[''"](.+?)[''"]') {
            $version = $matches[1]
            Write-Output "version=$version" >> $env:GITHUB_OUTPUT
          }

      - name: Create Git Tag
        id: create_tag
        shell: pwsh
        run: |
          $version = "${{ needs.build.outputs.new_version }}"
          $tagName = "v$($version -replace '[ \(\)]', '_')"

          Write-Host "Creating tag: $tagName" -ForegroundColor Cyan
          git tag -a $tagName -m "Release WinToolkit $version"

          $pushResult = git push origin $tagName 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Warning: Tag push failed or tag already exists" -ForegroundColor Yellow
          } else {
            Write-Host "Tag pushed successfully" -ForegroundColor Green
          }

          Write-Output "tag_name=$tagName" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.build.outputs.new_version }}"
          $sourceKB = "${{ needs.build.outputs.source_kb }}"
          $outputKB = "${{ needs.build.outputs.output_kb }}"
          $reduction = "${{ needs.build.outputs.reduction_percent }}"
          $linesRemoved = "${{ needs.build.outputs.lines_removed }}"

          $body = @"
            ## 📦 WinToolkit Release $version

            ### 📊 Statistiche Compressione

            | Metrica | Valore |
            |---------|--------|
            | Peso Sorgente | $sourceKB KB |
            | Peso Finale | $outputKB KB |
            | Riduzione | $reduction% |
            | Righe Eliminate | $linesRemoved |

            ### ✅ Note di rilascio

            - Compilazione automatica da sorgenti in `/tool`
            - Test di integrità superati
            - File pronto per l'uso

            ---
            *WinToolkit CI/CD Pipeline*
          "@

          $headers = @{
            'Authorization' = "Bearer $env:GITHUB_TOKEN"
            'Accept' = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }

          $owner = "${{ github.repository_owner }}"
          $repo = "${{ github.repo }}"

          $releaseUrl = "https://api.github.com/repos/$owner/$repo/releases"

          $releaseBody = @{
            tag_name = "v$($version -replace '[\\(\\)]', '_')"
            name = "WinToolkit $version"
            body = $body
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          try {
            $response = Invoke-RestMethod -Uri $releaseUrl -Method Post -Headers $headers -Body $releaseBody -ContentType 'application/json'
            Write-Host "Release created successfully: $($response.html_url)" -ForegroundColor Green
          } catch {
            Write-Host "Warning: Could not create release. $_" -ForegroundColor Yellow
          }

      - name: Final Summary
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║          🎉 RELEASE COMPLETATA CON SUCCESSO!          ║" -ForegroundColor Green
          Write-Host "╚══════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""
          Write-Host "📋 Dettagli:" -ForegroundColor Cyan
          Write-Host "  • Versione: ${{ needs.build.outputs.new_version }}" -ForegroundColor White
          Write-Host "  • Build:     ${{ needs.build.outputs.build_number }}" -ForegroundColor White
          Write-Host "  • Tag Git:   v${{ needs.build.outputs.new_version }}" -ForegroundColor White
          Write-Host "  • Compressione: ${{ needs.build.outputs.reduction_percent }}%" -ForegroundColor White
          Write-Host ""
