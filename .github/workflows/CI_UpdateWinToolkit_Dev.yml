# =============================================================================
# WinToolkit Enterprise CI/CD Pipeline
# =============================================================================
# Pipeline modulare per la compilazione, test e rilascio di WinToolkit.ps1
#
# IMPORTANT: This pipeline requires PowerShell 7+ to run properly.
# PowerShell 7 features (like null-coalescing operator ??) are used in the code.
# On windows-latest runners, 'shell: pwsh' automatically uses PowerShell 7 (pre-installed).
# No additional setup action is required.
# Job structure:
#   1. Linting    -> Analisi statica del codice sorgente
#   2. Build      -> Compilazione, test e statistiche compressione
#   3. Release    -> Commit, tag e GitHub Release
# =============================================================================

name: CI_WinToolkit_Enterprise

# ---------------------------------------------------------------------------
# TRIGGER
# ---------------------------------------------------------------------------
on:
  push:
    branches: [Dev]
    paths:
      - "tool/*.ps1"
      - "WinToolkit-template.ps1"
      - "compiler.ps1"

# ---------------------------------------------------------------------------
# CONCURRENCY - Previene build simultanee sulla stessa branch
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# JOB 1: LINTING - Analisi statica del codice
# ---------------------------------------------------------------------------
jobs:
  linting:
    name: Linting
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # windows-latest include già PowerShell 7 (pwsh). shell: pwsh lo usa automaticamente.
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Write-Host "Installing PSScriptAnalyzer..." -ForegroundColor Yellow
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
          } else {
            Write-Host "PSScriptAnalyzer already installed" -ForegroundColor Green
          }

      - name: Run PSScriptAnalyzer on tool files
        id: lint_tool
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI STATICA FILE /TOOL" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $settingsPath = ".github/linters/PSScriptAnalyzer-settings.psd1"
          $results = @()
          $hasErrors = $false

          $toolFiles = Get-ChildItem -Path "tool" -Filter "*.ps1" -ErrorAction SilentlyContinue

          foreach ($file in $toolFiles) {
            Write-Host "`nAnalyzing: $($file.Name)" -ForegroundColor Yellow

            $analysis = Invoke-ScriptAnalyzer -Path $file.FullName -Settings $settingsPath -Severity Error,Warning

            if ($analysis) {
              foreach ($issue in $analysis) {
                Write-Host "  ❌ $($issue.Severity): $($issue.RuleName)" -ForegroundColor Red
                Write-Host "     $($issue.Message)" -ForegroundColor Gray
                $results += [PSCustomObject]@{
                  File = $file.Name
                  Line = $issue.Line
                  Severity = $issue.Severity
                  Rule = $issue.RuleName
                  Message = $issue.Message
                }
                if ($issue.Severity -eq 'Error') {
                  $hasErrors = $true
                }
              }
            } else {
              Write-Host "  ✅ OK" -ForegroundColor Green
            }
          }

          # Salva i risultati per il prossimo job
          $results | ConvertTo-Json -Depth 3 | Out-File -FilePath "$env:TEMP\lint_results.json" -Encoding utf8

          if ($hasErrors) {
            Write-Host "`n❌ Errori di linting rilevati!" -ForegroundColor Red
            exit 1
          } else {
            Write-Host "`n✅ Linting completato senza errori" -ForegroundColor Green
          }

      - name: Run PSScriptAnalyzer on template
        id: lint_template
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI STATICA TEMPLATE" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $settingsPath = ".github/linters/PSScriptAnalyzer-settings.psd1"

          Write-Host "`nAnalyzing: WinToolkit-template.ps1" -ForegroundColor Yellow
          $analysis = Invoke-ScriptAnalyzer -Path "WinToolkit-template.ps1" -Settings $settingsPath -Severity Error,Warning

          if ($analysis) {
            foreach ($issue in $analysis) {
              Write-Host "  $($issue.Severity): $($issue.RuleName)" -ForegroundColor $(if($issue.Severity -eq 'Error'){'Red'}else{'Yellow'})
              Write-Host "     $($issue.Message)" -ForegroundColor Gray
            }
            $hasErrors = $analysis | Where-Object { $_.Severity -eq 'Error' }
            if ($hasErrors) {
              Write-Host "`n❌ Errori di linting nel template!" -ForegroundColor Red
              exit 1
            }
          } else {
            Write-Host "  ✅ OK" -ForegroundColor Green
          }

      - name: Check for syntax errors in compiler
        id: lint_compiler
        shell: pwsh
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI SINTASSI COMPILER" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $content = Get-Content -Raw -Path "compiler.ps1" -ErrorAction Stop
          $parseErrors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseInput($content, [ref]$null, [ref]$parseErrors)

          if ($parseErrors.Count -gt 0) {
            Write-Host "❌ Errori di sintassi in compiler.ps1:" -ForegroundColor Red
            foreach ($error in $parseErrors) {
              Write-Host "  Linea $($error.Extent.StartLineNumber): $($error.Message)" -ForegroundColor Red
            }
            exit 1
          } else {
            Write-Host "✅ Sintassi compiler.ps1 OK" -ForegroundColor Green
          }

  # ---------------------------------------------------------------------------
  # JOB 2: VERSION & TEST - Incremento versione e validazione template
  # ---------------------------------------------------------------------------
  versioning:
    name: Version & Test
    runs-on: windows-latest
    needs: linting

    permissions:
      contents: write
      actions: read

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ========================================
      # Step: Incrementa Versione nel Template
      # ========================================
      - name: Incrementa Versione
        id: version
        shell: pwsh
        run: |
          & .github/scripts/Update-Version.ps1 -TemplatePath "WinToolkit-template.ps1"

      # ========================================
      # Step: Test Sintassi Template
      # ========================================
      - name: Test Sintassi Template
        shell: pwsh
        run: |
          $content = Get-Content -Raw -Path "WinToolkit-template.ps1"
          $parseErrors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseInput($content, [ref]$null, [ref]$parseErrors)
          if ($parseErrors.Count -gt 0) {
            foreach ($err in $parseErrors) { Write-Error "Syntax Error: $($err.Message)" }
            exit 1
          }

      # ========================================
      # Step: Commit Template Aggiornato
      # ========================================
      - name: Commit WinToolkit Template
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🆙 Bump versione v${{ steps.version.outputs.new_version }}
          file_pattern: "WinToolkit-template.ps1"
          branch: Dev
          push_options: "--force"
          skip_fetch: true

  # ---------------------------------------------------------------------------
  # JOB 3: BUILD - Compilazione e commit finale script
  # ---------------------------------------------------------------------------
  build:
    name: Build & Release
    runs-on: windows-latest
    needs: versioning

    permissions:
      contents: write
      actions: read

    outputs:
      source_kb: ${{ steps.build_script.outputs.source_kb }}
      output_kb: ${{ steps.build_script.outputs.output_kb }}
      reduction_percent: ${{ steps.build_script.outputs.reduction_percent }}
      lines_removed: ${{ steps.build_script.outputs.lines_removed }}

    steps:
      - name: Checkout repository (Latest Dev)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: Dev # Forza il checkout dell'ultimo stato committato da Job 2

      # ========================================
      # Step: Compilazione WinToolkit.ps1
      # ========================================
      - name: Compilazione WinToolkit.ps1
        id: build_script
        shell: pwsh
        run: |
          $version = "${{ needs.versioning.outputs.new_version }}"
          & .github/scripts/Invoke-Build.ps1 -Version $version -OutputPath "WinToolkit.ps1"

      # ========================================
      # Step: Test File Compilato
      # ========================================
      - name: Test File Compilato
        id: test
        shell: pwsh
        run: |
          & .github/scripts/Test-CompiledScript.ps1 -ScriptPath "WinToolkit.ps1"

      # ========================================
      # Step: Commit WinToolkit Compiled Script
      # ========================================
      - name: Commit WinToolkit Compiled
        if: steps.test.outputs.tests_passed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            ✅ Compilato WinToolkit v${{ needs.versioning.outputs.new_version }}
          file_pattern: "WinToolkit.ps1"
          branch: Dev
          push_options: "--force"
          skip_fetch: true

      # ========================================
      # Step: Generate Build Summary
      # ========================================
      - name: Generate Build Summary
        if: steps.test.outputs.tests_passed == 'true'
        shell: pwsh
        run: |
          $version = "${{ needs.versioning.outputs.new_version }}"
          $sourceKB = "${{ steps.build_script.outputs.source_kb }}"
          $outputKB = "${{ steps.build_script.outputs.output_kb }}"
          $reduction = "${{ steps.build_script.outputs.reduction_percent }}"
          $linesRemoved = "${{ steps.build_script.outputs.lines_removed }}"

          $summary = @"
          ## 📦 Riepilogo Build & Test - WinToolkit v$version

          ### 📊 Statistiche Compressione

          | Metrica | Valore |
          |---------|--------|
          | Peso Sorgente | $sourceKB KB |
          | Peso Finale | $outputKB KB |
          | Riduzione | $reduction% |
          | Righe Eliminate | $linesRemoved |

          ### ✅ Stato Build

          - **Versione**: $version
          - **Stato**: Completato con successo (Double-Commit Flow)

          ---
          *Generato automaticamente da WinToolkit CI/CD Pipeline*
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║          🎉 BUILD COMPLETATA CON SUCCESSO!               ║" -ForegroundColor Green
          Write-Host "╚══════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""
          Write-Host "📋 Riepilogo:" -ForegroundColor Cyan
          Write-Host "  • Versione: v$version" -ForegroundColor White
          Write-Host "  • Compressione: $reduction%" -ForegroundColor White
          Write-Host ""

  # ---------------------------------------------------------------------------
  # JOB 4: RELEASE - Generazione automatica Pre-Release
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: windows-latest
    needs: [versioning, build]
    if: github.ref == 'refs/heads/Dev'

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: Dev

      - name: Extract PRs and Generate Notes
        id: notes
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.versioning.outputs.new_version }}"
          $targetDate = $null
          
          # Trova l'ultima release se esiste
          $lastRelease = gh release list --limit 1 | Select-String -Pattern "v\d" | ForEach-Object { ($_ -split "`t")[0] }
          
          if ($lastRelease) {
            Write-Host "Ultima release trovata: $lastRelease"
            $publishedAt = gh release view $lastRelease --json publishedAt -q .publishedAt
            $targetDate = [datetime]$publishedAt
          } else {
            Write-Host "Nessuna release precedente trovata. Cerco l'ultimo commit '✅ Compilato WinToolkit v*'"
            $commitDates = (git log --grep="✅ Compilato WinToolkit v" --format="%aI") -split "`n" | Where-Object { $_ -match "\S" }
            if ($commitDates.Count -gt 1) {
                # Prende il penultimo commit (quello dell'esecuzione precedente)
                $targetDate = [datetime]$commitDates[1]
                Write-Host "Trovato commit precedente: $targetDate"
            } else {
                Write-Host "Nessun commit precedente trovato, includo tutte le PR."
                $targetDate = [datetime]::MinValue
            }
          }
          
          # Ottieni le PR limitando a 100 per sicurezza
          $prsJson = gh pr list --state merged --base Dev --limit 100 --json title,url,author,mergedAt
          $prsObj = $prsJson | ConvertFrom-Json
          if ($null -eq $prsObj) { $prsObj = @() }
          
          # Filtra PR in base alla data e all'autore
          $validPrs = $prsObj | Where-Object { 
            ([datetime]$_.mergedAt -gt $targetDate) -and ($_.author.login -ne 'MagnetarMan') 
          }
          
          $releaseBody = "### 🛠 Modifiche dai Collaboratori`n`n"
          if ($validPrs.Count -gt 0) {
            foreach ($pr in $validPrs) {
              $releaseBody += "- [$($pr.title)]($($pr.url)) - @$($pr.author.login)`n"
            }
          } else {
            $releaseBody += "Nessun contributo esterno in questa build.`n"
          }
          
          $sourceKB = "${{ needs.build.outputs.source_kb }}"
          $outputKB = "${{ needs.build.outputs.output_kb }}"
          $reduction = "${{ needs.build.outputs.reduction_percent }}"
          $linesRemoved = "${{ needs.build.outputs.lines_removed }}"

          $releaseBody += "`n### 📊 Statistiche Compressione`n`n"
          $releaseBody += "| Metrica | Valore |`n"
          $releaseBody += "|---------|--------|`n"
          $releaseBody += "| Peso Sorgente | $sourceKB KB |`n"
          $releaseBody += "| Peso Finale | $outputKB KB |`n"
          $releaseBody += "| Riduzione | $reduction% |`n"
          $releaseBody += "| Righe Eliminate | $linesRemoved |`n"
          
          Write-Host "Contenuto della release:"
          Write-Host $releaseBody
          
          $releaseBody | Out-File -FilePath release_body.md -Encoding utf8

      - name: Create Pre-Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.versioning.outputs.new_version }}"
          $tag = "v$version"
          
          Write-Host "Creazione pre-release per il tag $tag"
          gh release create $tag "WinToolkit.ps1" --title "WinToolkit $tag (Dev Pre-Release)" --notes-file release_body.md --prerelease --target Dev
