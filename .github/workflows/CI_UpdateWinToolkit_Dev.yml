# =============================================================================
# WinToolkit Enterprise CI/CD Pipeline
# =============================================================================
# Pipeline modulare per la compilazione, test e rilascio di WinToolkit.ps1
#
# IMPORTANT: This pipeline requires PowerShell 7+ to run properly.
# PowerShell 7 features (like null-coalescing operator ??) are used in the code.
# On windows-latest runners, 'shell: pwsh' automatically uses PowerShell 7 (pre-installed).
# No additional setup action is required.
# Job structure:
#   1. Linting    -> Analisi statica del codice sorgente
#   2. Build      -> Compilazione, test e statistiche compressione
#   3. Release    -> Commit, tag e GitHub Release
# =============================================================================

name: CI_WinToolkit_Enterprise

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ---------------------------------------------------------------------------
# TRIGGER
# ---------------------------------------------------------------------------
on:
  push:
    branches: [Dev]
    paths:
      - "tool/*.ps1"
      - "WinToolkit-template.ps1"
      - "compiler.ps1"
      - "start-offline.ps1"
      - "start.ps1"
  pull_request:
    branches: [Dev]

# ---------------------------------------------------------------------------
# CONCURRENCY - Previene build simultanee sulla stessa branch
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# JOB 0: SECURITY GUARD - Protegge i file core e chiude PR non conformi
# ---------------------------------------------------------------------------
jobs:
  pr_security_guard:
    name: PR Security Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Changed Files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // Definisci i file o le cartelle permesse (solo tool/)
            const illegalFiles = files.filter(file => !file.filename.startsWith('tool/'));

            if (illegalFiles.length > 0) {
              const fileList = illegalFiles.map(f => `\`${f.filename}\``).join(', ');
              
              const message = `## ⚠️ Accesso Negato / Access Denied
              
              Ciao @${context.payload.pull_request.user.login}, 
              grazie per il tuo contributo! Tuttavia, questa PR è stata chiusa automaticamente per motivi di sicurezza.

              **Regola di contribuzione:**
              Per garantire l'integrità di WinToolkit, i collaboratori esterni possono modificare **solo** i file all'interno della cartella \`tool/\`. 
              
              Hai tentato di modificare i seguenti file protetti:
              ${fileList}

              **Cosa fare ora?**
              1. Ripristina i file core nel tuo fork.
              2. Apporta le tue modifiche esclusivamente ai singoli moduli dentro \`tool/\`.
              3. Apri una nuova Pull Request.

              *Questo à un messaggio automatico dal sistema di CI/CD di WinToolkit.*`;

              // Scrive il commento
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: message
              });

              // Chiude la Pull Request
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                state: 'closed'
              });

              core.setFailed("PR contiene modifiche a file protetti fuori dalla cartella /tool.");
            }

  # ---------------------------------------------------------------------------
  # JOB 1: LINTING - Analisi statica del codice
  # ---------------------------------------------------------------------------
  linting:
    name: Linting
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # windows-latest include già PowerShell 7 (pwsh). shell: pwsh lo usa automaticamente.
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Write-Host "Installing PSScriptAnalyzer..." -ForegroundColor Yellow
            Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -SkipPublisherCheck
          } else {
            Write-Host "PSScriptAnalyzer already installed" -ForegroundColor Green
          }

      - name: Run PSScriptAnalyzer on tool files
        id: lint_tool
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI STATICA FILE /TOOL" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $settingsPath = ".github/linters/PSScriptAnalyzer-settings.psd1"
          $results = @()
          $hasErrors = $false

          $toolFiles = Get-ChildItem -Path "tool" -Filter "*.ps1" -ErrorAction SilentlyContinue

          foreach ($file in $toolFiles) {
            Write-Host "`nAnalyzing: $($file.Name)" -ForegroundColor Yellow

            $analysis = Invoke-ScriptAnalyzer -Path $file.FullName -Settings $settingsPath -Severity Error,Warning

            if ($analysis) {
              foreach ($issue in $analysis) {
                Write-Host "  ❌ $($issue.Severity): $($issue.RuleName)" -ForegroundColor Red
                Write-Host "     $($issue.Message)" -ForegroundColor Gray
                $results += [PSCustomObject]@{
                  File = $file.Name
                  Line = $issue.Line
                  Severity = $issue.Severity
                  Rule = $issue.RuleName
                  Message = $issue.Message
                }
                if ($issue.Severity -eq 'Error') {
                  $hasErrors = $true
                }
              }
            } else {
              Write-Host "  ✅ OK" -ForegroundColor Green
            }
          }

          # Salva i risultati per il prossimo job
          $results | ConvertTo-Json -Depth 3 | Out-File -FilePath "$env:TEMP\lint_results.json" -Encoding utf8

          if ($hasErrors) {
            Write-Host "`n❌ Errori di linting rilevati!" -ForegroundColor Red
            exit 1
          } else {
            Write-Host "`n✅ Linting completato senza errori" -ForegroundColor Green
          }

      - name: Run PSScriptAnalyzer on template
        id: lint_template
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI STATICA TEMPLATE" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $settingsPath = ".github/linters/PSScriptAnalyzer-settings.psd1"

          Write-Host "`nAnalyzing: WinToolkit-template.ps1" -ForegroundColor Yellow
          $analysis = Invoke-ScriptAnalyzer -Path "WinToolkit-template.ps1" -Settings $settingsPath -Severity Error,Warning

          if ($analysis) {
            foreach ($issue in $analysis) {
              Write-Host "  $($issue.Severity): $($issue.RuleName)" -ForegroundColor $(if($issue.Severity -eq 'Error'){'Red'}else{'Yellow'})
              Write-Host "     $($issue.Message)" -ForegroundColor Gray
            }
            $hasErrors = $analysis | Where-Object { $_.Severity -eq 'Error' }
            if ($hasErrors) {
              Write-Host "`n❌ Errori di linting nel template!" -ForegroundColor Red
              exit 1
            }
          } else {
            Write-Host "  ✅ OK" -ForegroundColor Green
          }

      - name: Check for syntax errors in compiler
        id: lint_compiler
        shell: pwsh
        run: |
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "  ANALISI SINTASSI COMPILER" -ForegroundColor Cyan
          Write-Host "========================================" -ForegroundColor Cyan

          $content = Get-Content -Raw -Path "compiler.ps1" -ErrorAction Stop
          $parseErrors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseInput($content, [ref]$null, [ref]$parseErrors)

          if ($parseErrors.Count -gt 0) {
            Write-Host "❌ Errori di sintassi in compiler.ps1:" -ForegroundColor Red
            foreach ($error in $parseErrors) {
              Write-Host "  Linea $($error.Extent.StartLineNumber): $($error.Message)" -ForegroundColor Red
            }
            exit 1
          } else {
            Write-Host "✅ Sintassi compiler.ps1 OK" -ForegroundColor Green
          }

  # ---------------------------------------------------------------------------
  # JOB 2: VERSION & TEST - Incremento versione e validazione template
  # ---------------------------------------------------------------------------
  versioning:
    name: Version & Test
    runs-on: windows-latest
    if: github.repository == 'Magnetarman/WinToolkit'
    needs: linting
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      actions: read

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ========================================
      # Step: Incrementa Versione nel Template
      # ========================================
      - name: Incrementa Versione
        id: version
        shell: pwsh
        run: |
          & .github/scripts/Update-Version.ps1 -TemplatePath "WinToolkit-template.ps1"

      # ========================================
      # Step: Test Sintassi Template
      # ========================================
      - name: Test Sintassi Template
        shell: pwsh
        run: |
          $content = Get-Content -Raw -Path "WinToolkit-template.ps1"
          $parseErrors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseInput($content, [ref]$null, [ref]$parseErrors)
          if ($parseErrors.Count -gt 0) {
            foreach ($err in $parseErrors) { Write-Error "Syntax Error: $($err.Message)" }
            exit 1
          }

      # ========================================
      # Step: Commit Template Aggiornato
      # ========================================
      - name: Commit WinToolkit Template
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: |
            🆙 Bump versione v${{ steps.version.outputs.new_version }}
          file_pattern: "WinToolkit-template.ps1"
          branch: Dev
          push_options: "--force"
          skip_fetch: true

  # ---------------------------------------------------------------------------
  # JOB 3: BUILD - Compilazione e commit finale script
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: windows-latest
    if: github.repository == 'Magnetarman/WinToolkit'
    needs: versioning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      actions: read

    outputs:
      source_kb: ${{ steps.build_script.outputs.source_kb }}
      output_kb: ${{ steps.build_script.outputs.output_kb }}
      reduction_percent: ${{ steps.build_script.outputs.reduction_percent }}
      lines_removed: ${{ steps.build_script.outputs.lines_removed }}

    steps:
      - name: Checkout repository (Latest Dev)
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: Dev # Forza il checkout dell'ultimo stato committato da Job 2

      # ========================================
      # Step: Compilazione WinToolkit.ps1
      # ========================================
      - name: Compilazione WinToolkit.ps1
        id: build_script
        shell: pwsh
        run: |
          $version = "${{ needs.versioning.outputs.new_version }}"
          & .github/scripts/Invoke-Build.ps1 -Version $version -OutputPath "WinToolkit.ps1"

      # ========================================
      # Step: Test File Compilato
      # ========================================
      - name: Test File Compilato
        id: test
        shell: pwsh
        run: |
          & .github/scripts/Test-CompiledScript.ps1 -ScriptPath "WinToolkit.ps1"

      # ========================================
      # Step: Commit WinToolkit Compiled Script
      # ========================================
      - name: Commit WinToolkit Compiled
        if: steps.test.outputs.tests_passed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: |
            ✅ Compilato WinToolkit v${{ needs.versioning.outputs.new_version }}
          file_pattern: "WinToolkit.ps1"
          branch: Dev
          push_options: "--force"
          skip_fetch: true

      # ========================================
      # Step: Generate Build Summary
      # ========================================
      - name: Generate Build Summary
        if: steps.test.outputs.tests_passed == 'true'
        shell: pwsh
        run: |
          $version = "${{ needs.versioning.outputs.new_version }}"
          $sourceKB = "${{ steps.build_script.outputs.source_kb }}"
          $outputKB = "${{ steps.build_script.outputs.output_kb }}"
          $reduction = "${{ steps.build_script.outputs.reduction_percent }}"
          $linesRemoved = "${{ steps.build_script.outputs.lines_removed }}"

          $summary = @"
          ## 📦 Riepilogo Build & Test - WinToolkit v$version

          ### 📊 Statistiche Compressione

          | Metrica | Valore |
          |---------|--------|
          | Peso Sorgente | $sourceKB KB |
          | Peso Finale | $outputKB KB |
          | Riduzione | $reduction% |
          | Righe Eliminate | $linesRemoved |

          ### ✅ Stato Build

          - **Versione**: $version
          - **Stato**: Completato con successo (Double-Commit Flow)

          ---
          *Generato automaticamente da WinToolkit CI/CD Pipeline*
          "@

          $summary | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8

          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════╗" -ForegroundColor Green
          Write-Host "║          🎉 BUILD COMPLETATA CON SUCCESSO!               ║" -ForegroundColor Green
          Write-Host "╚══════════════════════════════════════════════════════════╝" -ForegroundColor Green
          Write-Host ""
          Write-Host "📋 Riepilogo:" -ForegroundColor Cyan
          Write-Host "  • Versione: v$version" -ForegroundColor White
          Write-Host "  • Compressione: $reduction%" -ForegroundColor White
          Write-Host ""

  # ---------------------------------------------------------------------------
  # JOB 4: RELEASE - Generazione automatica Pre-Release
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: windows-latest
    if: github.repository == 'Magnetarman/WinToolkit' && github.ref == 'refs/heads/Dev'
    needs: [versioning, build]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: Dev

      - name: Extract PRs and Generate Notes
        id: notes
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.versioning.outputs.new_version }}"

          # ─────────────────────────────────────────────────────────────────────
          # FASE 1 — Identificazione della release di riferimento ("Latest")
          #
          # Logica a tre livelli:
          #   1. Cerca la release STABILE più recente (--exclude-pre-releases).
          #      Questo corrisponde alla release marcata "Latest" su GitHub.
          #   2. Se non esiste, risale l'intera cronologia delle release cercando
          #      il flag isLatest:true via JSON (include pre-release se è l'unica).
          #   3. Fallback assoluto: usa la data del primo commit del repository
          #      così da includere l'intera storia (repo nuovo, nessuna release).
          # ─────────────────────────────────────────────────────────────────────
          $targetDate = $null

          Write-Host "──────────────────────────────────────────"
          Write-Host "  FASE 1: Ricerca release di riferimento"
          Write-Host "──────────────────────────────────────────"

          # ── Tentativo 1: release stabile più recente (status = Latest) ──────
          $stableTag = gh release list `
            --exclude-pre-releases `
            --limit 1 `
            --json tagName,publishedAt `
            --jq '.[0].tagName' 2>$null

          if ($stableTag -and $stableTag.Trim() -ne '') {
            $stableTag = $stableTag.Trim()
            Write-Host "✅ Release stabile (Latest) trovata: $stableTag"

            $publishedAtRaw = gh release view $stableTag `
              --json publishedAt `
              --jq '.publishedAt'

            # Parsing ISO8601 in modo esplicito per evitare errori di cultura
            $targetDate = [System.DateTimeOffset]::Parse(
              $publishedAtRaw.Trim(),
              [System.Globalization.CultureInfo]::InvariantCulture
            ).UtcDateTime

            Write-Host "📅 Data di taglio (publishedAt): $targetDate (UTC)"
          }

          # ── Tentativo 2: risali tutte le release cercando isLatest:true ─────
          if (-not $targetDate) {
            Write-Host "⚠️  Nessuna release stabile trovata. Scansione cronologia completa..."

            # Recupera tutte le release (max 200) in JSON con i campi utili
            $allReleasesJson = gh release list `
              --limit 200 `
              --json tagName,publishedAt,isLatest,isPrerelease

            $allReleases = $allReleasesJson | ConvertFrom-Json

            # Cerca il primo record con isLatest = true (già ordinato per data desc)
            $latestRecord = $allReleases | Where-Object { $_.isLatest -eq $true } | Select-Object -First 1

            if ($latestRecord) {
              Write-Host "✅ Record con isLatest=true trovato: $($latestRecord.tagName)"

              $targetRaw = $latestRecord.publishedAt
              $targetDate = if ($targetRaw -is [System.DateTime]) {
                $targetRaw
              } else {
                [System.DateTimeOffset]::Parse(
                  $targetRaw.Trim(),
                  [System.Globalization.CultureInfo]::InvariantCulture
                ).UtcDateTime
              }

              Write-Host "📅 Data di taglio (publishedAt): $targetDate (UTC)"
            }
          }

          # ── Fallback assoluto: data del primo commit (repository nuovo) ──────
          if (-not $targetDate) {
            Write-Host "⚠️  Nessuna release trovata. Uso la data del primo commit come fallback."

            $firstCommitDateRaw = git log --reverse --format="%aI" | Select-Object -First 1

            if ($firstCommitDateRaw -and $firstCommitDateRaw.Trim() -ne '') {
              $targetDate = [System.DateTimeOffset]::Parse(
                $firstCommitDateRaw.Trim(),
                [System.Globalization.CultureInfo]::InvariantCulture
              ).UtcDateTime

              # Sottraiamo 1 secondo per includere anche il primissimo commit
              $targetDate = $targetDate.AddSeconds(-1)
              Write-Host "📅 Data di taglio (primo commit): $targetDate (UTC)"
            } else {
              Write-Host "⚠️  Impossibile determinare il primo commit. Includo tutte le PR."
              $targetDate = [System.DateTime]::MinValue
            }
          }

          # ─────────────────────────────────────────────────────────────────────
          # FASE 2 — Recupero e filtraggio delle Pull Request
          #
          # - Base branch: Dev
          # - Stato: merged
          # - Filtro data: mergedAt STRETTAMENTE successivo a $targetDate
          # - Esclusi: owner (MagnetarMan) e bot (login terminante con [bot])
          # ─────────────────────────────────────────────────────────────────────
          Write-Host ""
          Write-Host "──────────────────────────────────────────"
          Write-Host "  FASE 2: Recupero e filtro PR"
          Write-Host "──────────────────────────────────────────"
          Write-Host "🔍 Filtro PR mergiate dopo: $targetDate (UTC)"

          $prsJson = gh pr list `
            --state merged `
            --base Dev `
            --limit 200 `
            --json title,url,author,mergedAt

          $prsObj = $prsJson | ConvertFrom-Json
          if (-not $prsObj) { $prsObj = @() }

          Write-Host "📋 PR totali recuperate: $($prsObj.Count)"

          # Lista di pattern bot/automazione da escludere
          $botPatterns = @(
            'MagnetarMan',       # Owner del repository
            '*[bot]',            # Bot generici GitHub (es. github-actions[bot])
            'dependabot*',       # Dependabot
            'renovate*'          # Renovate bot
          )

          $validPrs = $prsObj | Where-Object {
            # mergedAt è già un DateTime (PS7) o una stringa (PS5)? Gestiamo entrambi.
            $mergedAtUtc = if ($_.mergedAt -is [System.DateTime]) {
              $_.mergedAt
            } else {
              [System.DateTimeOffset]::Parse(
                $_.mergedAt.Trim(),
                [System.Globalization.CultureInfo]::InvariantCulture
              ).UtcDateTime
            }

            $afterCutoff = $mergedAtUtc -gt $targetDate

            # Controlla se l'autore corrisponde a uno dei pattern esclusi
            $authorLogin = $_.author.login
            $isExcluded = $false
            foreach ($pattern in $botPatterns) {
              if ($authorLogin -like $pattern) {
                $isExcluded = $true
                break
              }
            }

            $afterCutoff -and (-not $isExcluded)
          }

          Write-Host "✅ PR valide (dopo il filtro): $($validPrs.Count)"

          # ─────────────────────────────────────────────────────────────────────
          # FASE 3 — Composizione del corpo della release
          # ─────────────────────────────────────────────────────────────────────
          Write-Host ""
          Write-Host "──────────────────────────────────────────"
          Write-Host "  FASE 3: Generazione release notes"
          Write-Host "──────────────────────────────────────────"

          $releaseBody = "### 🛠 Modifiche dai Collaboratori`n`n"

          if ($validPrs.Count -gt 0) {
            foreach ($pr in $validPrs) {
              $releaseBody += "- [$($pr.title)]($($pr.url)) — @$($pr.author.login)`n"
            }
          } else {
            $releaseBody += "_Nessun contributo esterno in questa build._`n"
          }

          $sourceKB  = "${{ needs.build.outputs.source_kb }}"
          $outputKB  = "${{ needs.build.outputs.output_kb }}"
          $reduction = "${{ needs.build.outputs.reduction_percent }}"
          $linesRemoved = "${{ needs.build.outputs.lines_removed }}"

          $releaseBody += "`n### 📊 Statistiche Compressione`n`n"
          $releaseBody += "| Metrica          | Valore         |`n"
          $releaseBody += "|------------------|----------------|`n"
          $releaseBody += "| Peso Sorgente    | $sourceKB KB   |`n"
          $releaseBody += "| Peso Finale      | $outputKB KB   |`n"
          $releaseBody += "| Riduzione        | $reduction%    |`n"
          $releaseBody += "| Righe Eliminate  | $linesRemoved  |`n"

          Write-Host "── Anteprima release_body.md ──"
          Write-Host $releaseBody

          # Scrivi il file in UTF-8 senza BOM (compatibile con gh release)
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "release_body.md"),
            $releaseBody,
            [System.Text.UTF8Encoding]::new($false)
          )
          Write-Host "✅ release_body.md scritto correttamente."

      - name: Create Pre-Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.versioning.outputs.new_version }}"

          if (-not $version -or $version -eq '') {
              Write-Error "ERROR: The release version (tag) is empty. Ensure the versioning job sets outputs.new_version correctly."
              exit 1
          }

          # Sanitize tag name (replaces ' (' with '-', removes ')', and removes spaces)
          $tag = "v$version" -replace ' \(', '-' -replace '\)', '' -replace ' ', ''

          Write-Host "Creazione pre-release per la versione '$version' con il tag '$tag'"
          gh release create $tag "WinToolkit.ps1" --title "WinToolkit $tag (Dev Pre-Release)" --notes-file release_body.md --prerelease --target Dev
